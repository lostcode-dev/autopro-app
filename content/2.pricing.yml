faq:
  title: Perguntas frequentes
  description: Respostas rápidas sobre como o AutoPro está organizado hoje.
  items:
    - label: O AutoPro já separa fluxo operacional e admin?
      content: Sim. O fluxo operacional da oficina fica em /app e o fluxo administrativo global fica em /admin.
    - label: O sistema já cobre ordens de serviço?
      content: Sim. A base da migração já contempla banco e APIs principais para usuários, organizações, ordens de serviço e cobrança.
    - label: O módulo fiscal já está concluído?
      content: Ainda não. A base fiscal permanece em fase posterior de migração e por isso aparece como etapa avançada na documentação.
    - label: Posso cancelar quando quiser?
      content: Sim. A gestão de assinatura continua disponível no fluxo autenticado.
    - label: O AutoPro já está totalmente migrado?
      content: Ainda não. A migração está sendo feita por fases para reduzir risco e preservar o comportamento crítico do sistema.
    - label: Onde acompanho a evolução?
      content: Você pode acompanhar pelas páginas de documentação e changelog públicas do projeto.
