faq:
  title: Perguntas frequentes
  description: Dúvidas comuns antes de começar a usar o AutoPro.
  items:
    - label: Preciso instalar algum programa?
      content: Não. O AutoPro é 100% via navegador — funciona no computador, tablet e celular sem precisar instalar nada. Você acessa com seu login em qualquer dispositivo.
    - label: Meu time consegue usar sem treinamento técnico?
      content: Sim. O sistema foi pensado para o dia a dia da oficina, não para quem entende de tecnologia. A navegação é simples e o fluxo segue a lógica do trabalho real — atendimento, OS, fechamento, pagamento.
    - label: Posso testar antes de assinar?
      content: Sim. Você pode criar uma conta e explorar o sistema antes de escolher um plano. Sem precisar cadastrar cartão para começar.
    - label: Posso cancelar quando quiser?
      content: Sim. Não há fidelidade ou multa de cancelamento. Você gerencia a assinatura diretamente pelo painel do AutoPro e cancela quando quiser.
    - label: O sistema emite nota fiscal?
      content: Sim, no plano Oficina Completa. O AutoPro emite NFS-e e NF-e diretamente pela plataforma, com cancelamento, carta de correção e download de PDF — sem precisar de outro sistema.
    - label: Como funcionam as comissões dos funcionários?
      content: Você configura regras de comissão por funcionário — percentual sobre faturamento ou lucro, com filtros por categoria de serviço. O sistema calcula automaticamente com base nas OS fechadas e permite o pagamento em lote.
    - label: Posso usar em mais de uma unidade?
      content: Sim. O plano Oficina Completa suporta múltiplas unidades com dados e permissões isoladas por organização. Cada unidade opera de forma independente, mas sob o mesmo acesso administrativo.
    - label: Como funciona o suporte?
      content: Todos os planos têm acesso à documentação e ao canal de suporte. O plano Oficina Completa inclui suporte prioritário com tempo de resposta reduzido e acompanhamento de implantação.
