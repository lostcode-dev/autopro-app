title: O [AutoPro]{class="text-primary"} para organizar atendimento, oficina e gestão em um só lugar
description: Controle ordens de serviço, clientes, veículos, compras, financeiro e operação da oficina com um fluxo claro para o time e um fluxo separado para administração.
seo:
  title: AutoPro | Sistema para gestão de oficinas mecânicas
  description: AutoPro é um sistema para oficinas mecânicas com ordens de serviço, clientes, veículos, compras, estoque, financeiro e base para operações fiscais e administrativas.
navigation: false
hero:
  links:
    - label: Criar conta
      icon: i-lucide-arrow-right
      trailing: true
      to: /signup
      size: xl
    - label: Ver documentação
      icon: i-lucide-book-open
      size: xl
      color: neutral
      variant: subtle
      to: /docs/getting-started
sections:
  - title: Organize a operação da oficina do orçamento à entrega
    description: Reúna ordens de serviço, clientes, veículos e agendamentos em um fluxo operacional único, pensado para o dia a dia da oficina.
    id: features
    orientation: horizontal
    features:
      - name: Ordens de serviço centralizadas
        description: Controle abertura, andamento, pagamento, histórico e acompanhamento operacional em um único módulo.
        icon: i-lucide-clipboard-list
      - name: Clientes e veículos conectados
        description: Consulte o histórico do cliente junto com os veículos e os serviços executados.
        icon: i-lucide-car-front
      - name: Agenda e atendimento
        description: Organize entrada de veículos, agendamentos e próximos serviços sem depender de planilhas soltas.
        icon: i-lucide-calendar-days
  - title: Gestão financeira e compras com menos retrabalho
    description: Tenha visão mais clara sobre contas, compras, devoluções, fornecedores, impostos e fluxo financeiro da oficina.
    orientation: horizontal
    reverse: true
    features:
      - name: Compras e fornecedores
        description: Acompanhe solicitações, compras, devoluções e relacionamento com fornecedores.
        icon: i-lucide-shopping-cart
      - name: Financeiro operacional
        description: Controle contas, lançamentos, maquininhas, impostos e estrutura financeira com visão por organização.
        icon: i-lucide-wallet
      - name: Base para relatórios
        description: Estruture os dados da oficina para análises de faturamento, lucro, custos, clientes e desempenho.
        icon: i-lucide-bar-chart-3
features:
  title: Um sistema pensado para a rotina real da oficina
  description: AutoPro une operação, gestão e base administrativa em uma arquitetura moderna, preparada para crescer por fases.
  items:
    - title: Atendimento com contexto
      description: Veja cliente, veículo e histórico de ordens no mesmo fluxo.
      icon: i-lucide-users
    - title: Ordem de serviço como centro da operação
      description: Estruture diagnóstico, itens, pagamento, comissão e acompanhamento em torno da OS.
      icon: i-lucide-wrench
    - title: Financeiro integrado
      description: Relacione compras, pagamentos, contas bancárias e lançamentos com a operação diária.
      icon: i-lucide-banknote
    - title: Permissões por papel
      description: Separe acesso do time operacional e da administração com regras de permissão e contextos distintos.
      icon: i-lucide-shield-check
    - title: Fluxo do usuário e fluxo admin separados
      description: O `/app` atende a operação da oficina e o `/admin` concentra gestão global e suporte administrativo.
      icon: i-lucide-split-square-vertical
    - title: Base moderna para evolução contínua
      description: Nuxt no frontend, Supabase no backend e migração orientada por fases para reduzir risco.
      icon: i-lucide-layers-3
    - title: Preparado para relatórios e fiscal
      description: Estrutura pronta para crescer com relatórios gerenciais e módulos fiscais conforme as próximas fases.
      icon: i-lucide-file-stack
    - title: Organização por empresa
      description: Dados, permissões e operação respeitam o contexto da organização do usuário.
      icon: i-lucide-building-2
    - title: Menos dispersão, mais controle
      description: Substitua processos espalhados entre mensagens, cadernos e planilhas por um fluxo único.
      icon: i-lucide-layout-dashboard
testimonials:
  headline: Construído para oficina de verdade
  title: Menos improviso, mais clareza operacional
  description: Um sistema melhor quando o time precisa atender, organizar e decidir rápido.
  items:
    - quote: Quando a OS vira o centro do fluxo, o time para de caçar informação em lugares diferentes.
      user:
        name: Rafael Souza
        description: Gestor de oficina
        avatar:
          src: https://i.pravatar.cc/120?img=15
    - quote: Separar o acesso do time da oficina e do admin resolve muita confusão de processo e permissão.
      user:
        name: Camila Nogueira
        description: Operação administrativa
        avatar:
          src: https://i.pravatar.cc/120?img=20
    - quote: O valor está em ligar atendimento, compra, financeiro e histórico do veículo sem retrabalho.
      user:
        name: Marcelo Lima
        description: Proprietário de oficina
        avatar:
          src: https://i.pravatar.cc/120?img=24
    - quote: Com dados organizados por organização e permissões, fica muito mais fácil crescer sem perder controle.
      user:
        name: Aline Costa
        description: Administração
        avatar:
          src: https://i.pravatar.cc/120?img=32
cta:
  title: Quer estruturar a oficina com mais clareza?
  description: Comece a organizar operação, atendimento e gestão com a base atual do AutoPro.
  links:
    - label: Criar conta
      to: /signup
      trailingIcon: i-lucide-arrow-right
    - label: Ver documentação
      to: /docs/getting-started
      variant: subtle
      icon: i-lucide-book-open
